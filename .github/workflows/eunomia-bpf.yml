name: Build and test bpf-loader-rs on Ubuntu

on:
  push:
    branches: "*"
  pull_request:
    branches: "*"
env:
  BUILD_TYPE: Release
  INSTALL_LOCATION: .local
  RUST_BACKTRACE: 1

jobs:
  build:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[ci skip]')"

    steps:
    - uses: actions/checkout@v3
      with:
        submodules: 'recursive'

    - name: install deps
      run: |
        sudo make -C bpf-loader-rs install-deps

    - name: cache dependencies
      uses: actions/cache@v3
      id: cache
      with:
        path: ${{ github.workspace }}/${{ env.INSTALL_LOCATION }}
        key: ${{ runner.os }}-dependencies

    # 使用官方 Rust action
    - name: Setup Rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable

    # 运行单元测试，允许 dead_code 警告
    - name: run unit tests
      run: |
        cd bpf-loader-rs/
        cargo test --lib -- --nocapture --test-threads=1
      env:
        RUST_BACKTRACE: full
        RUST_LOG: debug
        RUSTFLAGS: "-A dead_code -D warnings"

    # 构建 release 版本
    - name: build bpf-loader-rs release
      run: |
        cd bpf-loader-rs/
        cargo build --release
      env:
        RUSTFLAGS: "-A dead_code"

    - name: make bpf-loader-rs with release profile
      run: make bpf-loader-rs
      env:
        RUSTFLAGS: "-A dead_code"

    # 使用现代的 codecov action
    - name: Code coverage using Codecov
      uses: codecov/codecov-action@v3
      with:
        fail_ci_if_error: false
        verbose: true