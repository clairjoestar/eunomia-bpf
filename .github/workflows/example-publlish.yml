name: Deploy examples

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Deploy gh-pages
    runs-on: ubuntu-latest
    container:
      image: ubuntu:24.04
      options: --privileged
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Install git and basic tools
        run: |
          apt-get update
          apt-get install -y git sudo ca-certificates wget

      - uses: actions/checkout@v3.3.0
      
      - name: Fix git safe directory
        run: |
          git config --global --add safe.directory '*'

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y \
            curl \
            build-essential \
            clang \
            llvm \
            libelf-dev \
            zlib1g-dev \
            cmake \
            pkg-config \
            libssl-dev

      - name: Install newer kernel headers
        run: |
          cd /tmp
          # 下载 6.11 内核头文件
          wget -q https://kernel.ubuntu.com/mainline/v6.11/amd64/linux-headers-6.11.0-061100_6.11.0-061100.202409151536_all.deb
          wget -q https://kernel.ubuntu.com/mainline/v6.11/amd64/linux-headers-6.11.0-061100-generic_6.11.0-061100.202409151536_amd64.deb
          # 安装
          dpkg -i linux-headers-*.deb || apt-get install -f -y
          # 验证安装
          ls -la /usr/src/
          ls -la /lib/modules/ || true

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: get submodule
        run: git submodule update --init --recursive --remote

      - name: install deps
        run: |
          . $HOME/.cargo/env
          make -C ecli install-deps

      - name: install test deps
        run: |
          . $HOME/.cargo/env
          make -C examples/tests install-deps
          make -C examples/tests install-wasm-clang

      - name: test build runners
        run: |
          . $HOME/.cargo/env
          make -C examples

      - name: test examples
        run: |
          . $HOME/.cargo/env
          SKIP_TESTS=profile make -C examples/tests test

      - uses: JamesIves/github-pages-deploy-action@v4.4.1
        if: ${{ github.event_name == 'push' }}
        with:
          branch: gh-pages
          folder: ./examples/bpftools/