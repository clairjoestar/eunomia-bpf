name: Deploy examples

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Deploy gh-pages
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v3.3.0
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - name: get submodule
        run: git submodule update --init --recursive --remote

      - name: Update Linux headers for bpftool compatibility
        run: |
             # 安装最新的 Linux 内核头文件以匹配 libbpf 版本
             sudo apt-get update
             sudo apt-get install -y linux-headers-$(uname -r) || true
             sudo apt-get install -y linux-libc-dev

      - name: Fix libclang dependencies
        run: |
             # 修复 Makefile 中的 libclang 版本依赖
             find . -name "Makefile" -type f -exec sed -i 's/libclang-13-dev/libclang-dev/g' {} +

      - name: install deps
        run: |
             sudo make -C ecli install-deps

      - name: install test deps
        run: |
              make -C examples/tests install-deps
              make -C examples/tests install-wasm-clang

      - name: test build runners
        run: |
              make -C examples

      - name: test examples
        run: |
              SKIP_TESTS=profile make -C examples/tests test

      - uses: JamesIves/github-pages-deploy-action@v4.4.1
        if: ${{ github.event_name == 'push' }}
        with:
          branch: gh-pages
          folder: ./examples/bpftools/