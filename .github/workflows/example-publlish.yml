name: Deploy examples

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Deploy gh-pages
    runs-on: ubuntu-22.04  # 使用 Ubuntu 22.04 以保证 libclang-13-dev 可用
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v3.3.0
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - name: get submodule
        run:  git submodule update --init --recursive --remote

      - name: Fix libclang dependencies
        run: |
             # 修复 Makefile 中的 libclang 版本依赖
             if [ -f compiler/Makefile ]; then
               sed -i 's/libclang-13-dev/libclang-dev/g' compiler/Makefile
             fi
             if [ -f ecli/Makefile ]; then
               sed -i 's/libclang-13-dev/libclang-dev/g' ecli/Makefile
             fi

      - name: install deps
        run: |
             sudo make -C ecli install-deps

      - name: install test deps
        run:  |
              make -C examples/tests install-deps
              make -C examples/tests install-wasm-clang

      - name: test build runners
        run:  |
              make -C examples

      - name: test examples
        run:  |
              SKIP_TESTS=profile make -C examples/tests test

      - uses: JamesIves/github-pages-deploy-action@v4.4.1
        if: ${{ github.event_name == 'push' }}
        with:
          branch: gh-pages
          folder: ./examples/bpftools/