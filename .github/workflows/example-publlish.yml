name: Deploy examples

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Deploy gh-pages
    runs-on: ubuntu-latest
    container:
      image: ubuntu:24.04
      options: --privileged
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Install git and basic tools
        run: |
          apt-get update
          apt-get install -y git sudo

      - uses: actions/checkout@v3.3.0
      
      - name: Fix git safe directory
        run: |
          git config --global --add safe.directory /__w/eunomia-bpf/eunomia-bpf
          git config --global --add safe.directory '*'

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y \
            curl \
            build-essential \
            clang \
            llvm \
            libelf-dev \
            zlib1g-dev \
            cmake \
            pkg-config \
            libssl-dev \
            ca-certificates \
            wget \
            software-properties-common

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          . $HOME/.cargo/env
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          rustc --version
          cargo --version

      - name: get submodule
        run: git submodule update --init --recursive --remote

      - name: Patch bpftool for kernel compatibility (post-submodule)
        run: |
          # Patch bpftool's skel_internal.h to be compatible with older kernel headers
          cd third_party/bpftool/src/libbpf/include/bpf

          if [ -f skel_internal.h ]; then
            echo "Patching skel_internal.h for kernel 6.8 compatibility..."
            # Patch the file to skip using unavailable kernel features
            sed -i 's/offsetofend(union bpf_attr, excl_prog_hash_size)/sizeof(union bpf_attr)/g' skel_internal.h || true
            sed -i 's/attr\.excl_prog_hash = /\/\/ attr.excl_prog_hash = /g' skel_internal.h || true
            sed -i 's/attr\.excl_prog_hash_size = /\/\/ attr.excl_prog_hash_size = /g' skel_internal.h || true
            sed -i 's/info\.hash = /\/\/ info.hash = /g' skel_internal.h || true
            sed -i 's/info\.hash_size = /\/\/ info.hash_size = /g' skel_internal.h || true
            sed -i 's/offsetofend(union bpf_attr, keyring_id)/sizeof(union bpf_attr)/g' skel_internal.h || true
            sed -i 's/attr\.signature = /\/\/ attr.signature = /g' skel_internal.h || true
            sed -i 's/attr\.signature_size = /\/\/ attr.signature_size = /g' skel_internal.h || true
            sed -i 's/attr\.keyring_id = /\/\/ attr.keyring_id = /g' skel_internal.h || true
            echo "Patch applied successfully"
          else
            echo "Warning: skel_internal.h not found"
          fi

      - name: install deps
        run: |
          . $HOME/.cargo/env
          make -C ecli install-deps

      - name: install test deps
        run: |
          . $HOME/.cargo/env
          make -C examples/tests install-deps
          make -C examples/tests install-wasm-clang

      - name: test build runners
        run: |
          . $HOME/.cargo/env
          make -C examples

      - name: test examples
        run: |
          . $HOME/.cargo/env
          SKIP_TESTS=profile make -C examples/tests test

      - uses: JamesIves/github-pages-deploy-action@v4.4.1
        if: ${{ github.event_name == 'push' }}
        with:
          branch: gh-pages
          folder: ./examples/bpftools/