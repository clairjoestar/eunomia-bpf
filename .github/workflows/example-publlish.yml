name: Deploy examples

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Deploy gh-pages
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v3.3.0
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - name: get submodule
        run: git submodule update --init --recursive

      - name: Checkout compatible bpftool version
        run: |
          cd third_party/bpftool
          # Ubuntu 24.04 (noble) 使用内核 6.8
          # 回退到 bpftool v7.3.0，它与内核 6.8 兼容
          git fetch --tags
          git checkout v7.3.0
          cd ../..

      - name: install deps
        run: |
          sudo make -C ecli install-deps

      - name: install test deps
        run: |
          make -C examples/tests install-deps
          make -C examples/tests install-wasm-clang

      - name: test build runners
        run: |
          make -C examples

      - name: test examples
        run: |
          SKIP_TESTS=profile make -C examples/tests test

      - uses: JamesIves/github-pages-deploy-action@v4.4.1
        if: ${{ github.event_name == 'push' }}
        with:
          branch: gh-pages
          folder: ./examples/bpftools/