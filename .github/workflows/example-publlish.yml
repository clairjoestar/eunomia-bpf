name: Deploy examples

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Deploy gh-pages
    runs-on: ubuntu-latest
    container:
      image: ubuntu:24.04
      options: --privileged
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Install git and basic tools
        run: |
          apt-get update
          apt-get install -y git sudo

      - uses: actions/checkout@v3.3.0
      
      - name: Fix git safe directory
        run: |
          git config --global --add safe.directory /__w/eunomia-bpf/eunomia-bpf
          git config --global --add safe.directory '*'

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y \
            curl \
            build-essential \
            clang \
            llvm \
            libelf-dev \
            zlib1g-dev \
            cmake \
            pkg-config \
            libssl-dev \
            ca-certificates \
            wget \
            software-properties-common

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          . $HOME/.cargo/env
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          rustc --version
          cargo --version

      - name: get submodule
        run: git submodule update --init --recursive --remote

      - name: install deps and build with kernel compatibility patch
        run: |
          set -e
          . $HOME/.cargo/env

          echo "=== Installing dependencies ==="
          make -C compiler install-deps
          make -C ecli install-deps

          echo "=== Applying kernel 6.8 compatibility patch to libbpf ==="
          LIBBPF_SKEL="third_party/bpftool/src/libbpf/src/skel_internal.h"
          if [ -f "$LIBBPF_SKEL" ]; then
            echo "Patching $LIBBPF_SKEL for Ubuntu 24.04 (kernel 6.8)..."
            # Comment out code using kernel features only available in 6.12+
            sed -i 's/offsetofend(union bpf_attr, excl_prog_hash_size)/sizeof(union bpf_attr)/g' "$LIBBPF_SKEL"
            sed -i 's/attr\.excl_prog_hash = /\/\/ attr.excl_prog_hash = /g' "$LIBBPF_SKEL"
            sed -i 's/attr\.excl_prog_hash_size = /\/\/ attr.excl_prog_hash_size = /g' "$LIBBPF_SKEL"
            sed -i 's/info\.hash = /\/\/ info.hash = /g' "$LIBBPF_SKEL"
            sed -i 's/info\.hash_size = /\/\/ info.hash_size = /g' "$LIBBPF_SKEL"
            sed -i 's/offsetofend(union bpf_attr, keyring_id)/sizeof(union bpf_attr)/g' "$LIBBPF_SKEL"
            sed -i 's/attr\.signature = /\/\/ attr.signature = /g' "$LIBBPF_SKEL"
            sed -i 's/attr\.signature_size = /\/\/ attr.signature_size = /g' "$LIBBPF_SKEL"
            sed -i 's/attr\.keyring_id = /\/\/ attr.keyring_id = /g' "$LIBBPF_SKEL"
            echo "✓ Patch applied successfully"
          else
            echo "ERROR: $LIBBPF_SKEL not found!"
            echo "Directory contents:"
            ls -la third_party/bpftool/src/libbpf/src/ | head -20 || true
            exit 1
          fi

          echo "=== Building compiler (includes bpftool) ==="
          make -C compiler
          make -C compiler install

          echo "=== Building ecli ==="
          make -C ecli install
          cp ecli/target/release/ecli-rs examples/tests/ecli

          echo "=== Installing wasm clang ==="
          make -C examples/tests install-wasm-clang

          echo "✓ All dependencies installed and built successfully"

      - name: test build runners
        run: |
          . $HOME/.cargo/env
          make -C examples

      - name: test examples
        run: |
          . $HOME/.cargo/env
          SKIP_TESTS=profile make -C examples/tests test

      - uses: JamesIves/github-pages-deploy-action@v4.4.1
        if: ${{ github.event_name == 'push' }}
        with:
          branch: gh-pages
          folder: ./examples/bpftools/